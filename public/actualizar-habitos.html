<!DOCTYPE html>

<html lang="es">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Actualizar Hábitos | HuellaGo</title>
    <link rel="stylesheet" href="assets/styles/sidebar.css">
    <link rel="stylesheet" href="assets/styles/navbar.css">
    <link rel="stylesheet" href="assets/styles/actualizar-habitos.css">
    <link rel="stylesheet" href="assets/styles/logout-modal.css">


</head>

<body>

    <div class="app-container">


        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN -->

 <main class="main-content">

    <!-- HEADER -->
    <div id="navbar-container"></div>

    <div id="mainContainer">

        <!-- TITULO -->
        <div class="back-link">
            <a href="mi-huella.html">
                <span>←</span>
                <span>Volver atrás</span>
            </a>
        </div>

        <section class="welcome">

            <div>
                <h1>Actualizar hábitos</h1>

                <p>
                    Modifica la información de tu estilo de vida sin realizar una nueva medición completa.
                </p>
            </div>

        </section>

                <!-- TRANSPORTE -->

                <section class="card">

                    <h3>🚲 Transporte</h3>

                    <div class="habit-grid">

                        <div class="input-group">

                            <label>Medio principal</label>

                            <select id="habMedio">

                                <option>Bicicleta</option>
                                <option>Auto</option>
                                <option>Bus</option>
                                <option>Moto</option>
                                <option>Caminando</option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>Kilómetros por semana</label>

                            <input type="number" id="habKm" placeholder="15" min="0">

                        </div>

                        <div class="input-group">

                            <label>Días por semana</label>

                            <select id="habDias">

                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                                <option>5</option>

                            </select>

                        </div>

                    </div>

                </section>

                <!-- ENERGIA -->

                <section class="card">

                    <h3>⚡ Energía</h3>

                    <div class="habit-grid">

                        <div class="input-group">

                            <label>Tipo de vivienda</label>

                            <select id="habVivienda">

                                <option>Casa</option>
                                <option>Departamento</option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>Personas en casa</label>

                            <input type="number" id="habPersonas" placeholder="3" min="1">

                        </div>

                        <div class="input-group">

                            <label>Fuente principal</label>

                            <select id="habFuente">

                                <option>Electricidad</option>
                                <option>Gas</option>
                                <option>Solar</option>

                            </select>

                        </div>

                    </div>

                </section>

                <!-- ALIMENTACION -->

                <section class="card">

                    <h3>🍎 Alimentación</h3>

                    <div class="habit-grid">

                        <div class="input-group">

                            <label>Tipo de alimentación</label>

                            <select id="habDieta">

                                <option>Mixta</option>
                                <option>Vegetariana</option>
                                <option>Vegana</option>

                            </select>

                        </div>

                    </div>

                </section>

                <!-- RESIDUOS -->

                <section class="card">

                    <h3>♻️ Residuos</h3>

                    <div class="habit-grid">

                        <div class="input-group">

                            <label>Uso de plásticos</label>

                            <select id="habPlasticos">

                                <option>Bajo</option>
                                <option>Medio</option>
                                <option>Alto</option>

                            </select>

                        </div>

                        <div class="input-group">

                            <label>¿Reciclas en casa?</label>

                            <select id="habRecicla">

                                <option>Sí</option>
                                <option>No</option>

                            </select>

                        </div>

                    </div>

                </section>

                <div class="save-container">

                    <button class="action-btn green" id="saveHabitsBtn">
                        Guardar cambios
                    </button>

                </div>

            </div> <!-- FIN mainContainer -->

        </main>

    </div> <!-- FIN app-container -->

    <!-- PANTALLA ÉXITO -->

    <div class="success-screen" id="successScreen">

        <div class="success-icon">
            ✓
        </div>

        <h1>
            ¡Cambios guardados!
        </h1>

        <p>
            Tu perfil y preferencias
            se han actualizado correctamente.
        </p>

        <button class="action-btn green" id="backProfileBtn">
            Volver a mi perfil
        </button>

    </div>


    <!-- COMPONENTES -->

    <script src="assets/scripts/huella-data.js"></script>
    <script src="assets/scripts/actualizar-habitos.js"></script>
    <script src="assets/scripts/components.js"></script>

    <div id="logout-modal-container"></div>

</body>

</html>
