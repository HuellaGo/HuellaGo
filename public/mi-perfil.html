<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi perfil | HuellaGo</title>

    <link rel="stylesheet" href="assets/styles/sidebar.css">
    <link rel="stylesheet" href="assets/styles/navbar.css">
    <link rel="stylesheet" href="assets/styles/dashboard.css">
<link rel="stylesheet" href="assets/styles/perfil.css">
    <link rel="stylesheet" href="assets/styles/logout-modal.css">

</head>

<body class="profile-body" data-page="mi-perfil">

    <div class="profile-page">

        <!-- TOPBAR -->
        <header class="profile-topbar">

            <button class="icon-btn" id="hamburgerBtn" aria-label="Menú">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <h1>Mi perfil</h1>

        </header>

        <!-- AVATAR -->
        <div class="profile-avatar-wrap">

            <div class="avatar-circle">
                <img src="assets/icons/user.png" alt="Avatar de usuario">
                <div class="avatar-edit-badge" title="Editar foto">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                        </path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </div>
            </div>

            <h2 class="profile-name" id="profileName">Mateo</h2>
            <p class="profile-subtitle" id="profileSubtitle">Guardian | <span class="level-highlight">nivel 1</span></p>

        </div>

        <!-- STATS -->
        <div class="profile-stats-row">

            <div class="profile-stat-card">
                <div class="stat-val" id="profileEcoPuntos">1250</div>
                <div class="stat-lbl">Eco puntos</div>
            </div>

            <div class="profile-stat-card">
                <div class="stat-val" id="profileHuella">2.45 t CO2e</div>
                <div class="stat-lbl">Huella actual</div>
            </div>

        </div>

        <!-- MENU -->
        <div class="profile-menu-card">

            <a class="profile-menu-item" href="editar-perfil.html">
                <div class="menu-item-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"></path>
                    </svg>
                    <span>Editar perfil</span>
                </div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <a class="profile-menu-item" href="insignias.html">
                <div class="menu-item-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="8" r="6"></circle>
                        <path d="M15.5 13.5 17 22l-5-3-5 3 1.5-8.5"></path>
                    </svg>
                    <span>Mis logros e insignias</span>
                </div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <a class="profile-menu-item" href="mi-huella.html">
                <div class="menu-item-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M3 3v18h18"></path>
                        <path d="M18.7 8 13 13.7l-3-3L4.7 15"></path>
                    </svg>
                    <span>Historial de impacto</span>
                </div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <a class="profile-menu-item" href="ajustes.html#notificaciones">
                <div class="menu-item-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span>Notificaciones</span>
                </div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <a class="profile-menu-item" href="ajustes.html#privacidad">
                <div class="menu-item-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>Ajustes de privacidad</span>
                </div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>

            <button class="profile-menu-item" id="ayudaSoporteBtn" type="button">
                <div class="menu-item-left">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 2-3 4"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <span>Ayuda y soporte</span>
                </div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>

        </div>

        <!-- LOGOUT -->
        <button class="logout-btn" id="logoutBtn" type="button">Cerrar Sesión</button>

    </div>

    <script src="assets/scripts/components.js"></script>
    <script src="assets/scripts/huella-data.js"></script>
    <script src="assets/scripts/retos-data.js"></script>
    <script src="assets/scripts/insignias-data.js"></script>
    <script src="assets/scripts/perfil.js"></script>
    <div id="logout-modal-container"></div>

</body>

</html>
