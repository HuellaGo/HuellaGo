<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - HuellaGo</title>
    <link rel="stylesheet" href="assets/styles/register.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-form">

            <a href="index.html" class="back-btn">
                <img src="assets/images/Flecha.png" alt="Volver">
            </a>

            <h1>Crear cuenta</h1>
            <p>Únete a HuellaGo y comienza a reducir tu huella ambiental.</p>

            <form>

                <input
                    type="text"
                    placeholder="Nombres y apellidos"
                    required
                >

                <input
                    type="email"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="password"
                    placeholder="Contraseña"
                    required
                >

                <input
                    type="password"
                    placeholder="Confirmar contraseña"
                    required
                >

                <label class="checkbox-container">
                    <input type="checkbox" required>

                    <span>
                        Acepto los términos y condiciones de HuellaGo.
                    </span>
                </label>

                <button type="submit" class="btn-primary">
                    Crear cuenta
                </button>

            </form>

            <div class="divider">
                <span>o</span>
            </div>

            <button class="btn-google">
                Continuar con Google
            </button>

            <button class="btn-microsoft">
                Continuar con Microsoft
            </button>

            <p class="bottom-link">
                ¿Ya tienes cuenta?
                <a href="login.html">Iniciar Sesión</a>
            </p>

        </div>

        <div class="auth-image">
            <img src="assets/images/Planeta.png" alt="HuellaGo">
        </div>

    </div>

</div>
<script src="assets/scripts/register.js"></script>

</body>
</html>
